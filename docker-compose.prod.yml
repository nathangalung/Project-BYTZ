version: "3.8"

# KerjaCUS! Full Production Stack
# Deploy via Dokploy as a Compose service
# Total estimated RAM: ~4.2 GB (fits in 8GB VPS with lapormbg.com)

services:
  # ============================================================
  # DATABASES & INFRASTRUCTURE
  # ============================================================
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ${DB_USER:-kerjacus}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-kerjacus}
    volumes:
      - kerjacus_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-kerjacus}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DATABASE_URL: postgresql://${DB_USER:-kerjacus}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-kerjacus}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      AUTH_TYPE: plain
      CLIENT_TLS_SSLMODE: disable
      SERVER_TLS_SSLMODE: disable
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 32M

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - kerjacus_redis_data:/data
    deploy:
      resources:
        limits:
          memory: 96M

  nats:
    image: nats:2-alpine
    command: ["--jetstream", "--store_dir=/data"]
    volumes:
      - kerjacus_nats_data:/data
    deploy:
      resources:
        limits:
          memory: 64M

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - kerjacus_minio_data:/data
    deploy:
      resources:
        limits:
          memory: 256M

  # ============================================================
  # REAL-TIME & AI GATEWAY
  # ============================================================
  centrifugo:
    image: centrifugo/centrifugo:v6
    command: centrifugo -c /centrifugo.json
    environment:
      CENTRIFUGO_TOKEN_HMAC_SECRET_KEY: ${CENTRIFUGO_SECRET}
      CENTRIFUGO_API_KEY: ${CENTRIFUGO_API_KEY}
      CENTRIFUGO_ALLOWED_ORIGINS: https://kerjacus.id,https://admin.kerjacus.id
    deploy:
      resources:
        limits:
          memory: 64M

  tensorzero:
    image: tensorzero/gateway:latest
    command: ["--config-file", "/etc/tensorzero/tensorzero.toml"]
    environment:
      GOOGLE_AI_STUDIO_API_KEY: ${LLM_API_KEY}
    volumes:
      - ./apps/gateway/tensorzero.toml:/etc/tensorzero/tensorzero.toml:ro
    deploy:
      resources:
        limits:
          memory: 64M

  # ============================================================
  # WORKFLOW ORCHESTRATION (Temporal)
  # ============================================================
  temporal-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: ${TEMPORAL_DB_PASSWORD:-temporal_prod_2026}
      POSTGRES_DB: temporal
    volumes:
      - kerjacus_temporal_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M

  temporal:
    image: temporalio/auto-setup:latest
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: ${TEMPORAL_DB_PASSWORD:-temporal_prod_2026}
      POSTGRES_SEEDS: temporal-db
      DYNAMIC_CONFIG_FILE_PATH: /etc/temporal/dynamic-config.yaml
    volumes:
      - ./apps/gateway/temporal-dynamic-config.yaml:/etc/temporal/dynamic-config.yaml:ro
    depends_on:
      temporal-db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  temporal-ui:
    image: temporalio/ui:latest
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: https://temporal.kerjacus.id
    depends_on:
      - temporal
    deploy:
      resources:
        limits:
          memory: 64M

  # ============================================================
  # LLM OBSERVABILITY (Langfuse)
  # ============================================================
  langfuse-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD:-langfuse_prod_2026}
      POSTGRES_DB: langfuse
    volumes:
      - kerjacus_langfuse_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24.1-alpine
    volumes:
      - kerjacus_langfuse_clickhouse:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 128M

  langfuse:
    image: langfuse/langfuse:latest
    environment:
      DATABASE_URL: postgresql://langfuse:${LANGFUSE_DB_PASSWORD:-langfuse_prod_2026}@langfuse-db:5432/langfuse
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: " "
      NEXTAUTH_URL: https://langfuse.kerjacus.id
      NEXTAUTH_SECRET: ${LANGFUSE_SECRET}
      SALT: ${LANGFUSE_SALT}
      TELEMETRY_ENABLED: "false"
      LANGFUSE_INIT_ORG_ID: kerjacus
      LANGFUSE_INIT_ORG_NAME: KerjaCUS!
      LANGFUSE_INIT_PROJECT_ID: kerjacus-main
      LANGFUSE_INIT_PROJECT_NAME: KerjaCUS Main
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
    depends_on:
      langfuse-db:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kerjacus-langfuse.rule=Host(`langfuse.kerjacus.id`)"
      - "traefik.http.routers.kerjacus-langfuse.entrypoints=websecure"
      - "traefik.http.routers.kerjacus-langfuse.tls.certresolver=letsencrypt"
      - "traefik.http.services.kerjacus-langfuse.loadbalancer.server.port=3000"
    deploy:
      resources:
        limits:
          memory: 256M

  # ============================================================
  # FEATURE FLAGS (Flagsmith)
  # ============================================================
  flagsmith-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: flagsmith
      POSTGRES_PASSWORD: ${FLAGSMITH_DB_PASSWORD:-flagsmith_prod_2026}
      POSTGRES_DB: flagsmith
    volumes:
      - kerjacus_flagsmith_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flagsmith"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M

  flagsmith:
    image: flagsmith/flagsmith:latest
    environment:
      DATABASE_URL: postgresql://flagsmith:${FLAGSMITH_DB_PASSWORD:-flagsmith_prod_2026}@flagsmith-db:5432/flagsmith
      DJANGO_ALLOWED_HOSTS: "*"
      ALLOW_ADMIN_INITIATION_VIA_CLI: "true"
      FLAGSMITH_DOMAIN: flagsmith.kerjacus.id
      ENV: production
    depends_on:
      flagsmith-db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kerjacus-flagsmith.rule=Host(`flagsmith.kerjacus.id`)"
      - "traefik.http.routers.kerjacus-flagsmith.entrypoints=websecure"
      - "traefik.http.routers.kerjacus-flagsmith.tls.certresolver=letsencrypt"
      - "traefik.http.services.kerjacus-flagsmith.loadbalancer.server.port=8000"
    deploy:
      resources:
        limits:
          memory: 256M

  # ============================================================
  # OBSERVABILITY (SigNoz)
  # ============================================================
  signoz-clickhouse:
    image: clickhouse/clickhouse-server:24.1-alpine
    volumes:
      - kerjacus_signoz_clickhouse:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  signoz-otel-collector:
    image: signoz/signoz-otel-collector:latest
    command: ["--config=/etc/otel-collector-config.yaml"]
    environment:
      SIGNOZ_LOCAL_DB_PATH: /var/lib/signoz/signoz.db
      OTEL_RESOURCE_ATTRIBUTES: service.name=signoz-collector
    volumes:
      - kerjacus_signoz_collector:/var/lib/signoz
      - ./apps/gateway/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    depends_on:
      signoz-clickhouse:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  signoz-query-service:
    image: signoz/query-service:latest
    environment:
      SIGNOZ_TELEMETRYSTORE_PROVIDER: clickhouse
      SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN: tcp://signoz-clickhouse:9000
      GODEBUG: netdns=go
    volumes:
      - kerjacus_signoz_query:/var/lib/signoz
    depends_on:
      signoz-clickhouse:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  signoz:
    image: signoz/frontend:latest
    depends_on:
      - signoz-query-service
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kerjacus-signoz.rule=Host(`signoz.kerjacus.id`)"
      - "traefik.http.routers.kerjacus-signoz.entrypoints=websecure"
      - "traefik.http.routers.kerjacus-signoz.tls.certresolver=letsencrypt"
      - "traefik.http.services.kerjacus-signoz.loadbalancer.server.port=3301"
    deploy:
      resources:
        limits:
          memory: 128M

  # ============================================================
  # MONITORING
  # ============================================================
  uptime-kuma:
    image: louislam/uptime-kuma:1
    volumes:
      - kerjacus_uptime_data:/app/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kerjacus-uptime.rule=Host(`status.kerjacus.id`)"
      - "traefik.http.routers.kerjacus-uptime.entrypoints=websecure"
      - "traefik.http.routers.kerjacus-uptime.tls.certresolver=letsencrypt"
      - "traefik.http.services.kerjacus-uptime.loadbalancer.server.port=3001"
    deploy:
      resources:
        limits:
          memory: 96M

  # ============================================================
  # APPLICATION SERVICES
  # ============================================================
  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
    environment:
      DATABASE_URL: postgresql://${DB_USER:-kerjacus}:${DB_PASSWORD}@pgbouncer:5432/${DB_NAME:-kerjacus}?sslmode=disable
      DATABASE_DIRECT_URL: postgresql://${DB_USER:-kerjacus}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-kerjacus}?sslmode=disable
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: https://api.kerjacus.id
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      CORS_ORIGIN: https://kerjacus.id
      NODE_ENV: production
      ZENZIVA_USER_KEY: ${ZENZIVA_USER_KEY}
      ZENZIVA_API_KEY: ${ZENZIVA_API_KEY}
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 128M

  project-service:
    build:
      context: .
      dockerfile: apps/project-service/Dockerfile
    environment:
      DATABASE_URL: postgresql://${DB_USER:-kerjacus}:${DB_PASSWORD}@pgbouncer:5432/${DB_NAME:-kerjacus}?sslmode=disable
      DATABASE_DIRECT_URL: postgresql://${DB_USER:-kerjacus}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-kerjacus}?sslmode=disable
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      AI_SERVICE_URL: http://ai-service:3003
      CORS_ORIGIN: https://kerjacus.id
      AUTH_SERVICE_URL: http://auth-service:3001
      SERVICE_AUTH_SECRET: ${SERVICE_AUTH_SECRET}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://signoz-otel-collector:4317
      TEMPORAL_URL: temporal:7233
      TEMPORAL_NAMESPACE: kerjacus
      NODE_ENV: production
    depends_on:
      pgbouncer:
        condition: service_started
      nats:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 160M

  ai-service:
    build:
      context: .
      dockerfile: apps/ai-service/Dockerfile
    environment:
      DATABASE_URL: postgresql://${DB_USER:-kerjacus}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-kerjacus}?sslmode=disable
      TENSORZERO_API_URL: http://tensorzero:3333
      LLM_API_KEY: ${LLM_API_KEY}
      SERVICE_AUTH_SECRET: ${SERVICE_AUTH_SECRET}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: http://langfuse:3000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://signoz-otel-collector:4317
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 384M

  payment-service:
    build:
      context: ./apps/payment-service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${DB_USER:-kerjacus}:${DB_PASSWORD}@pgbouncer:5432/${DB_NAME:-kerjacus}?sslmode=disable
      MIDTRANS_SERVER_KEY: ${MIDTRANS_SERVER_KEY}
      MIDTRANS_SNAP_URL: https://app.sandbox.midtrans.com/snap/v1/transactions
      AUTH_SERVICE_URL: http://auth-service:3001
      PROJECT_SERVICE_URL: http://project-service:3002
      SERVICE_AUTH_SECRET: ${SERVICE_AUTH_SECRET}
      CORS_ORIGIN: https://kerjacus.id
      PORT: "3004"
    depends_on:
      pgbouncer:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 48M

  notification-service:
    build:
      context: ./apps/notification-service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${DB_USER:-kerjacus}:${DB_PASSWORD}@pgbouncer:5432/${DB_NAME:-kerjacus}?sslmode=disable
      NATS_URL: nats://nats:4222
      RESEND_API_KEY: ${RESEND_API_KEY}
      CENTRIFUGO_URL: http://centrifugo:8000
      CENTRIFUGO_API_KEY: ${CENTRIFUGO_API_KEY}
      AUTH_SERVICE_URL: http://auth-service:3001
      SERVICE_AUTH_SECRET: ${SERVICE_AUTH_SECRET}
      PORT: "3005"
    depends_on:
      pgbouncer:
        condition: service_started
      nats:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 48M

  admin-service:
    build:
      context: ./apps/admin-service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${DB_USER:-kerjacus}:${DB_PASSWORD}@pgbouncer:5432/${DB_NAME:-kerjacus}?sslmode=disable
      AUTH_SERVICE_URL: http://auth-service:3001
      SERVICE_AUTH_SECRET: ${SERVICE_AUTH_SECRET}
      CORS_ORIGIN: https://admin.kerjacus.id
      PORT: "3006"
    depends_on:
      pgbouncer:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 48M

  # ============================================================
  # FRONTENDS
  # ============================================================
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: https://api.kerjacus.id
        VITE_APP_URL: https://kerjacus.id
        VITE_MIDTRANS_CLIENT_KEY: ${MIDTRANS_CLIENT_KEY}
        VITE_CENTRIFUGO_URL: wss://api.kerjacus.id/centrifugo/connection/websocket
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kerjacus-web.rule=Host(`kerjacus.id`) || Host(`www.kerjacus.id`)"
      - "traefik.http.routers.kerjacus-web.entrypoints=websecure"
      - "traefik.http.routers.kerjacus-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.kerjacus-web.loadbalancer.server.port=80"
    deploy:
      resources:
        limits:
          memory: 32M

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        VITE_API_URL: https://api.kerjacus.id
        VITE_APP_URL: https://admin.kerjacus.id
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kerjacus-admin.rule=Host(`admin.kerjacus.id`)"
      - "traefik.http.routers.kerjacus-admin.entrypoints=websecure"
      - "traefik.http.routers.kerjacus-admin.tls.certresolver=letsencrypt"
      - "traefik.http.services.kerjacus-admin.loadbalancer.server.port=80"
    deploy:
      resources:
        limits:
          memory: 32M

  # ============================================================
  # API GATEWAY
  # ============================================================
  api-gateway:
    image: nginx:alpine
    volumes:
      - ./nginx-api-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kerjacus-api.rule=Host(`api.kerjacus.id`)"
      - "traefik.http.routers.kerjacus-api.entrypoints=websecure"
      - "traefik.http.routers.kerjacus-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.kerjacus-api.loadbalancer.server.port=80"
    depends_on:
      - auth-service
      - project-service
      - ai-service
      - payment-service
      - notification-service
      - admin-service
    deploy:
      resources:
        limits:
          memory: 16M

volumes:
  kerjacus_pg_data:
  kerjacus_redis_data:
  kerjacus_nats_data:
  kerjacus_minio_data:
  kerjacus_temporal_db:
  kerjacus_langfuse_db:
  kerjacus_langfuse_clickhouse:
  kerjacus_flagsmith_db:
  kerjacus_signoz_clickhouse:
  kerjacus_signoz_collector:
  kerjacus_signoz_query:
  kerjacus_uptime_data:

networks:
  default:
    external: true
    name: dokploy-network
