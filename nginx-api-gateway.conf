# KerjaCUS! API Gateway
# Routes api.kerjacus.id/* to internal microservices
# Handles CORS for cross-origin requests from kerjacus.id

resolver 127.0.0.11 valid=10s ipv6=off;

# Allowed origins map
map $http_origin $cors_origin {
    default "";
    "https://kerjacus.id" "https://kerjacus.id";
    "https://www.kerjacus.id" "https://www.kerjacus.id";
    "https://admin.kerjacus.id" "https://admin.kerjacus.id";
}

server {
    listen 80;
    server_name _;

    # Global CORS headers added to all responses
    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, Cookie, X-Request-ID, X-Service-Auth" always;
    add_header Access-Control-Max-Age "86400" always;

    # Handle preflight OPTIONS requests globally
    if ($request_method = 'OPTIONS') {
        return 204;
    }

    # Common proxy headers (reused via include-like pattern)
    # Each location sets its own upstream variable for DNS resolution

    # Auth service
    location /api/v1/auth/ {
        set $auth_upstream http://auth-service:3001;
        proxy_pass $auth_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    location /api/v1/me {
        set $auth_upstream http://auth-service:3001;
        proxy_pass $auth_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    location /api/v1/phone {
        set $auth_upstream http://auth-service:3001;
        proxy_pass $auth_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    # Project service
    location /api/v1/projects {
        set $project_upstream http://project-service:3002;
        proxy_pass $project_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    location /api/v1/work-packages {
        set $project_upstream http://project-service:3002;
        proxy_pass $project_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    location /api/v1/milestones {
        set $project_upstream http://project-service:3002;
        proxy_pass $project_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    location /api/v1/matching {
        set $project_upstream http://project-service:3002;
        proxy_pass $project_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    location /api/v1/reviews {
        set $project_upstream http://project-service:3002;
        proxy_pass $project_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    location /api/v1/disputes {
        set $project_upstream http://project-service:3002;
        proxy_pass $project_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    location /api/v1/contracts {
        set $project_upstream http://project-service:3002;
        proxy_pass $project_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    location /api/v1/chat {
        set $project_upstream http://project-service:3002;
        proxy_pass $project_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    location /api/v1/applications {
        set $project_upstream http://project-service:3002;
        proxy_pass $project_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    location /api/v1/talent-profiles {
        set $project_upstream http://project-service:3002;
        proxy_pass $project_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    location /api/v1/upload {
        set $project_upstream http://project-service:3002;
        proxy_pass $project_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        client_max_body_size 10M;
    }

    location /api/v1/activities {
        set $project_upstream http://project-service:3002;
        proxy_pass $project_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    location /api/v1/time-logs {
        set $project_upstream http://project-service:3002;
        proxy_pass $project_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    # AI service
    location /api/v1/ai {
        set $ai_upstream http://ai-service:3003;
        proxy_pass $ai_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_read_timeout 120s;
    }

    # Payment service (Go)
    location /api/v1/payments {
        set $payment_upstream http://payment-service:3004;
        proxy_pass $payment_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    # Notification service (Go)
    location /api/v1/notifications {
        set $notif_upstream http://notification-service:3005;
        proxy_pass $notif_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    # Admin service (Go)
    location /api/v1/admin {
        set $admin_upstream http://admin-service:3006;
        proxy_pass $admin_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    # Centrifugo WebSocket
    location /centrifugo/ {
        set $centrifugo_upstream http://centrifugo:8000;
        proxy_pass $centrifugo_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # Health check
    location /health {
        return 200 '{"status":"ok","service":"api-gateway"}';
        add_header Content-Type application/json;
    }
}
