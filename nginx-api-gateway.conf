# KerjaCUS! API Gateway
# Routes api.kerjacus.id/* to internal microservices

upstream auth_service {
    server auth-service:3001;
}
upstream project_service {
    server project-service:3002;
}
upstream ai_service {
    server ai-service:3003;
}
upstream payment_service {
    server payment-service:3004;
}
upstream notification_service {
    server notification-service:3005;
}
upstream admin_service {
    server admin-service:3006;
}
upstream centrifugo_service {
    server centrifugo:8000;
}

server {
    listen 80;
    server_name _;

    # Auth service
    location /api/v1/auth/ {
        proxy_pass http://auth_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    location /api/v1/me {
        proxy_pass http://auth_service;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
    }

    location /api/v1/phone {
        proxy_pass http://auth_service;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
    }

    # Project service (handles most routes)
    location /api/v1/projects {
        proxy_pass http://project_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Cookie $http_cookie;
    }

    location /api/v1/work-packages {
        proxy_pass http://project_service;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
    }

    location /api/v1/milestones {
        proxy_pass http://project_service;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
    }

    location /api/v1/matching {
        proxy_pass http://project_service;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
    }

    location /api/v1/reviews {
        proxy_pass http://project_service;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
    }

    location /api/v1/disputes {
        proxy_pass http://project_service;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
    }

    location /api/v1/contracts {
        proxy_pass http://project_service;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
    }

    location /api/v1/chat {
        proxy_pass http://project_service;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
    }

    location /api/v1/applications {
        proxy_pass http://project_service;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
    }

    location /api/v1/talent-profiles {
        proxy_pass http://project_service;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
    }

    location /api/v1/upload {
        proxy_pass http://project_service;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
        client_max_body_size 10M;
    }

    location /api/v1/activities {
        proxy_pass http://project_service;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
    }

    location /api/v1/time-logs {
        proxy_pass http://project_service;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
    }

    # AI service
    location /api/v1/ai {
        proxy_pass http://ai_service;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_read_timeout 120s;
    }

    # Payment service (Go)
    location /api/v1/payments {
        proxy_pass http://payment_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Cookie $http_cookie;
    }

    # Notification service (Go)
    location /api/v1/notifications {
        proxy_pass http://notification_service;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
    }

    # Admin service (Go)
    location /api/v1/admin {
        proxy_pass http://admin_service;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
    }

    # Centrifugo WebSocket
    location /centrifugo/ {
        proxy_pass http://centrifugo_service/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # Health check
    location /health {
        return 200 '{"status":"ok","service":"api-gateway"}';
        add_header Content-Type application/json;
    }
}
