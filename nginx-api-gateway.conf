# KerjaCUS! API Gateway
# Single source of truth for CORS — strips duplicate headers from backends

resolver 127.0.0.11 valid=10s ipv6=off;

map $http_origin $cors_origin {
    default "";
    "https://kerjacus.id" "https://kerjacus.id";
    "https://www.kerjacus.id" "https://www.kerjacus.id";
    "https://admin.kerjacus.id" "https://admin.kerjacus.id";
}

server {
    listen 80;
    server_name _;

    # Strip backend CORS headers so we don't get duplicates
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Max-Age;
    proxy_hide_header Vary;

    # Add our CORS headers to all proxied responses
    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Vary "Origin" always;

    # Preflight handler
    location = /cors-preflight {
        internal;
        add_header Access-Control-Allow-Origin $cors_origin;
        add_header Access-Control-Allow-Credentials "true";
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, Cookie, X-Request-ID, X-Service-Auth";
        add_header Access-Control-Max-Age "86400";
        add_header Content-Length 0;
        add_header Content-Type "text/plain";
        return 204;
    }

    # All /api/ locations — handle OPTIONS via error_page trick
    location /api/ {
        # Route OPTIONS to internal preflight handler
        error_page 418 = /cors-preflight;
        recursive_error_pages on;
        if ($request_method = 'OPTIONS') {
            return 418;
        }

        # Default: proxy to project-service (catch-all for /api/v1/*)
        set $upstream http://project-service:3002;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    # Auth service
    location /api/v1/auth/ {
        error_page 418 = /cors-preflight;
        recursive_error_pages on;
        if ($request_method = 'OPTIONS') { return 418; }

        set $upstream http://auth-service:3001;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    location /api/v1/me {
        error_page 418 = /cors-preflight;
        recursive_error_pages on;
        if ($request_method = 'OPTIONS') { return 418; }

        set $upstream http://auth-service:3001;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    location /api/v1/phone {
        error_page 418 = /cors-preflight;
        recursive_error_pages on;
        if ($request_method = 'OPTIONS') { return 418; }

        set $upstream http://auth-service:3001;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    # AI service
    location /api/v1/ai {
        error_page 418 = /cors-preflight;
        recursive_error_pages on;
        if ($request_method = 'OPTIONS') { return 418; }

        set $upstream http://ai-service:3003;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_read_timeout 120s;
    }

    # Payment service
    location /api/v1/payments {
        error_page 418 = /cors-preflight;
        recursive_error_pages on;
        if ($request_method = 'OPTIONS') { return 418; }

        set $upstream http://payment-service:3004;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    # Notification service
    location /api/v1/notifications {
        error_page 418 = /cors-preflight;
        recursive_error_pages on;
        if ($request_method = 'OPTIONS') { return 418; }

        set $upstream http://notification-service:3005;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    # Admin service
    location /api/v1/admin {
        error_page 418 = /cors-preflight;
        recursive_error_pages on;
        if ($request_method = 'OPTIONS') { return 418; }

        set $upstream http://admin-service:3006;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    # Centrifugo WebSocket
    location /centrifugo/ {
        set $upstream http://centrifugo:8000;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # Health
    location /health {
        add_header Content-Type application/json always;
        add_header Access-Control-Allow-Origin $cors_origin always;
        return 200 '{"status":"ok","service":"api-gateway"}';
    }
}
