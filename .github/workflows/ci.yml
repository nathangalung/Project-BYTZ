name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Biome check
        run: bun run check

      - name: TypeScript type check
        run: bunx turbo run typecheck

  test-unit:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: bytz_test
          POSTGRES_PASSWORD: bytz_test
          POSTGRES_DB: bytz_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bytz_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests with coverage
        run: bunx turbo run test:coverage
        env:
          DATABASE_URL: postgresql://bytz_test:bytz_test@localhost:5432/bytz_test
          DATABASE_DIRECT_URL: postgresql://bytz_test:bytz_test@localhost:5432/bytz_test
          REDIS_URL: redis://localhost:6379
          NATS_URL: nats://localhost:4222
          BETTER_AUTH_SECRET: test-secret-minimum-32-characters-long
          BETTER_AUTH_URL: http://localhost:3001
          NODE_ENV: test

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            packages/*/coverage/
            apps/*/coverage/
          retention-days: 14

  test-go:
    name: Go Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Payment Service Tests
        working-directory: apps/payment-service
        run: go test ./... -cover -count=1

      - name: Notification Service Tests
        working-directory: apps/notification-service
        run: go test ./... -cover -count=1

      - name: Admin Service Tests
        working-directory: apps/admin-service
        run: go test ./... -cover -count=1

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: AI Service Tests
        working-directory: apps/ai-service
        run: uv run pytest tests/ --cov=app --cov-report=term -q

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

      - name: Run Grype dependency scan
        uses: anchore/scan-action@v6
        with:
          path: .
          severity-cutoff: high
          fail-build: true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-unit, test-go, test-python, security-scan]
    strategy:
      matrix:
        service:
          - auth-service
          - project-service
          - payment-service
          - notification-service
          - admin-service
          - web
          - admin
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build ${{ matrix.service }}
        run: bunx turbo run build --filter=@bytz/${{ matrix.service }}

      - name: Build Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          if [ -f "apps/${{ matrix.service }}/Dockerfile" ]; then
            docker build -t bytz/${{ matrix.service }}:${{ github.sha }} -f apps/${{ matrix.service }}/Dockerfile .
          fi

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Coolify
        run: |
          echo "Deployment triggered for commit ${{ github.sha }}"
          # Coolify webhook trigger would go here
          # curl -X POST "$COOLIFY_WEBHOOK_URL" -H "Authorization: Bearer $COOLIFY_TOKEN"
