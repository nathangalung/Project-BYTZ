<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KerjaCUS! — Managed Cross-Industry Project Marketplace</title>
    <meta name="description" content="Platform managed marketplace untuk proyek lintas industri di Indonesia. Digitalisasi penciptaan lapangan kerja melalui AI-powered scoping, talent matching, dan project management." />
    <meta name="theme-color" content="#2b3d42" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Open Graph (WhatsApp, Telegram, Discord, Facebook, LinkedIn) -->
    <meta property="og:title" content="KerjaCUS! — Managed Cross-Industry Project Marketplace" />
    <meta property="og:description" content="Digitalisasi penciptaan lapangan kerja di Indonesia. Platform yang menghubungkan pemilik proyek dari berbagai industri dengan talenta yang tepat." />
    <meta property="og:image" content="https://kerjacus.id/preview.png" />
    <meta property="og:image:width" content="1881" />
    <meta property="og:image:height" content="1324" />
    <meta property="og:url" content="https://kerjacus.id" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="KerjaCUS!" />
    <meta property="og:locale" content="id_ID" />

    <!-- Twitter/X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="KerjaCUS! — Managed Cross-Industry Project Marketplace" />
    <meta name="twitter:description" content="Digitalisasi penciptaan lapangan kerja di Indonesia." />
    <meta name="twitter:image" content="https://kerjacus.id/preview.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Prevent FOUC: apply dark class before paint -->
    <script>
      (() => {
        var t = localStorage.getItem('kerjacus-theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <a href="#main-content" style="position:fixed;top:8px;left:8px;z-index:9999;padding:12px 16px;background:#1d4a54;color:#fff;border-radius:8px;font-weight:600;font-size:14px;text-decoration:none;transform:translateY(-200px)" onfocus="this.style.transform='translateY(0)'" onblur="this.style.transform='translateY(-200px)'">Skip to content</a>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
