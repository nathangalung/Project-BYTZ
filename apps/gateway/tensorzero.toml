[gateway]
bind_address = "0.0.0.0:3333"

# Models (Google AI Studio / Gemini)

[models.gemini-flash]
routing = ["gemini-flash-google"]

[models.gemini-flash.providers.gemini-flash-google]
type = "google_ai_studio_gemini"
model_name = "gemini-2.0-flash"

[models.gemini-pro]
routing = ["gemini-pro-google"]

[models.gemini-pro.providers.gemini-pro-google]
type = "google_ai_studio_gemini"
model_name = "gemini-2.5-pro-preview-06-05"

# Functions

[functions.chatbot]
type = "chat"

[functions.chatbot.variants.production]
type = "chat_completion"
weight = 1.0
model = "gemini-flash"
temperature = 0.7
max_tokens = 2048

[functions.brd_generation]
type = "json"

[functions.brd_generation.variants.production]
type = "chat_completion"
weight = 1.0
model = "gemini-pro"
temperature = 0.3
max_tokens = 8192

[functions.prd_generation]
type = "json"

[functions.prd_generation.variants.production]
type = "chat_completion"
weight = 1.0
model = "gemini-pro"
temperature = 0.3
max_tokens = 16384

[functions.cv_extraction]
type = "json"

[functions.cv_extraction.variants.production]
type = "chat_completion"
weight = 1.0
model = "gemini-pro"
temperature = 0.1
max_tokens = 4096
